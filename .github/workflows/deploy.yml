    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@master
        with:
          host: 187.127.150.67
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/kamna-traders-b2b
            ./deploy.sh
